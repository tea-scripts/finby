name: finby

services:
  postgres:
    image: postgres:16-alpine
    container_name: finby-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finby
      POSTGRES_PASSWORD: finby
      POSTGRES_DB: finby
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finby -d finby"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finby-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
